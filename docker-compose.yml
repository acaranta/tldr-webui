services:
  tldr-webui:
    build: .
    ports:
      - "8129:3000"
    volumes:
      - ./tldr-data:/tldr-pages
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  tldr-data:
    driver: local
